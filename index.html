<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Chat</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #22c55e;
      --accent-2: #38bdf8;
      --danger: #ef4444;
      --border: #374151;
      --bubble-self: #1d4ed8;
      --bubble-other: #111827;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, #020617, var(--bg));
      color: var(--text);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .app {
      width: min(1100px, 100%);
      height: min(92vh, 920px);
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr auto;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      backdrop-filter: blur(10px);
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(17,24,39,.75);
    }

    .brand h1 {
      margin: 0;
      font-size: 20px;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      justify-self: end;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(34,197,94,.15);
    }

    .chat {
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .msg {
      max-width: min(760px, 92%);
      border: 1px solid var(--border);
      background: var(--bubble-other);
      border-radius: 18px;
      padding: 12px 14px;
      align-self: flex-start;
      word-break: break-word;
    }

    .msg.self {
      align-self: flex-end;
      background: rgba(29, 78, 216, .22);
      border-color: rgba(56, 189, 248, .35);
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .name { color: #fff; font-weight: 700; }
    .text { white-space: pre-wrap; line-height: 1.45; }
    .filebox {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,.08);
    }

    img.preview {
      max-width: 100%;
      max-height: 320px;
      border-radius: 14px;
      display: block;
      margin-top: 10px;
      border: 1px solid rgba(255,255,255,.1);
    }

    .filelink {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,.04);
      color: var(--text);
      text-decoration: none;
      margin-top: 8px;
      border: 1px solid rgba(255,255,255,.08);
    }

    .composer {
      border-top: 1px solid var(--border);
      padding: 14px;
      background: rgba(2,6,23,.55);
    }

    .row {
      display: grid;
      grid-template-columns: 190px 1fr auto;
      gap: 10px;
      margin-bottom: 10px;
    }

    .row2 {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 10px;
      align-items: end;
    }

    input, textarea, button {
      font: inherit;
      border-radius: 14px;
      border: 1px solid var(--border);
      outline: none;
    }

    input, textarea {
      background: var(--panel-2);
      color: var(--text);
      padding: 12px 14px;
    }

    textarea {
      resize: none;
      min-height: 48px;
      max-height: 140px;
      line-height: 1.45;
    }

    button {
      background: var(--panel-2);
      color: var(--text);
      padding: 12px 14px;
      cursor: pointer;
      transition: .2s ease;
      white-space: nowrap;
    }

    button:hover { transform: translateY(-1px); }
    .send { background: var(--accent); color: #052e16; font-weight: 800; border: none; }
    .clear { background: transparent; color: #fca5a5; border-color: rgba(239,68,68,.35); }
    .small { font-size: 12px; color: var(--muted); margin-top: 8px; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(56,189,248,.12);
      border: 1px solid rgba(56,189,248,.22);
      color: #bae6fd;
      font-size: 12px;
    }

    .hidden { display: none; }

    @media (max-width: 760px) {
      .app { height: 100vh; border-radius: 0; }
      .topbar, .row, .row2 { grid-template-columns: 1fr; }
      .status { justify-self: start; }
      .msg { max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <h1>Global Chat</h1>
        <p>Chat theo tên, lưu lịch sử, gửi ảnh và file. Bản này chạy ngay trong trình duyệt.</p>
      </div>
      <div class="status"><span class="dot"></span><span id="statusText">Đang hoạt động</span></div>
    </div>

    <div id="chat" class="chat"></div>

    <div class="composer">
      <div class="row">
        <input id="name" type="text" placeholder="Nhập tên của bạn" maxlength="30" />
        <input id="room" type="text" placeholder="Room chung" value="global" maxlength="30" />
        <button id="saveName">Lưu tên</button>
      </div>

      <div class="row2">
        <textarea id="message" placeholder="Nhập tin nhắn..."></textarea>
        <input id="file" type="file" multiple />
        <button id="clearFiles">Bỏ file</button>
        <button id="send" class="send">Gửi</button>
      </div>

      <div id="fileInfo" class="small"></div>
      <div class="small">Gợi ý: bấm Enter để gửi, Shift+Enter để xuống dòng.</div>
    </div>
  </div>

  <script>
    const chatEl = document.getElementById('chat');
    const nameEl = document.getElementById('name');
    const roomEl = document.getElementById('room');
    const msgEl = document.getElementById('message');
    const fileEl = document.getElementById('file');
    const fileInfoEl = document.getElementById('fileInfo');
    const statusText = document.getElementById('statusText');

    const saveNameBtn = document.getElementById('saveName');
    const sendBtn = document.getElementById('send');
    const clearFilesBtn = document.getElementById('clearFiles');

    const LS_NAME = 'gc_name_v1';
    const LS_ROOM = 'gc_room_v1';
    const LS_MSGS = 'gc_msgs_v1';
    const channel = 'BroadcastChannel' in window ? new BroadcastChannel('global_chat_channel') : null;

    let pendingFiles = [];
    let myName = localStorage.getItem(LS_NAME) || 'Khách';
    let currentRoom = localStorage.getItem(LS_ROOM) || 'global';
    nameEl.value = myName;
    roomEl.value = currentRoom;

    function nowTime() {
      return new Date().toLocaleString('vi-VN', {
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    function getMessages() {
      try {
        return JSON.parse(localStorage.getItem(LS_MSGS) || '[]');
      } catch {
        return [];
      }
    }

    function setMessages(arr) {
      localStorage.setItem(LS_MSGS, JSON.stringify(arr));
    }

    function escapeHTML(s) {
      return s.replace(/[&<>"]+/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
    }

    function render() {
      const msgs = getMessages().filter(m => m.room === currentRoom);
      chatEl.innerHTML = msgs.map(m => {
        const filesHtml = (m.files || []).map(f => {
          if (f.type && f.type.startsWith('image/')) {
            return `<img class="preview" src="${f.data}" alt="image" />`;
          }
          return `<a class="filelink" href="${f.data}" download="${escapeHTML(f.name)}">📎 ${escapeHTML(f.name)}</a>`;
        }).join('');

        return `
          <div class="msg ${m.name === myName ? 'self' : ''}">
            <div class="meta">
              <span class="name">${escapeHTML(m.name)}</span>
              <span>${escapeHTML(m.time)}</span>
            </div>
            <div class="text">${escapeHTML(m.text || '')}</div>
            ${filesHtml ? `<div class="filebox">${filesHtml}</div>` : ''}
          </div>
        `;
      }).join('');

      chatEl.scrollTop = chatEl.scrollHeight;
      statusText.textContent = `Room: ${currentRoom} • ${msgs.length} tin nhắn`;
    }

    function updateFileInfo() {
      const names = pendingFiles.map(f => f.name).join(', ');
      fileInfoEl.textContent = names ? `Đã chọn: ${names}` : 'Chưa chọn file nào.';
    }

    function loadFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve({
          name: file.name,
          type: file.type,
          data: reader.result
        });
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function sendMessage() {
      const text = msgEl.value.trim();
      const name = nameEl.value.trim() || 'Khách';
      const room = roomEl.value.trim() || 'global';

      myName = name;
      currentRoom = room;
      localStorage.setItem(LS_NAME, myName);
      localStorage.setItem(LS_ROOM, currentRoom);

      if (!text && pendingFiles.length === 0) return;

      const files = [];
      for (const file of pendingFiles) {
        files.push(await loadFile(file));
      }

      const msgs = getMessages();
      msgs.push({
        id: crypto.randomUUID(),
        name: myName,
        room: currentRoom,
        text,
        files,
        time: nowTime()
      });
      setMessages(msgs);
      msgEl.value = '';
      pendingFiles = [];
      fileEl.value = '';
      updateFileInfo();
      render();
      if (channel) channel.postMessage({ room: currentRoom, type: 'new-message' });
    }

    saveNameBtn.onclick = () => {
      myName = nameEl.value.trim() || 'Khách';
      currentRoom = roomEl.value.trim() || 'global';
      localStorage.setItem(LS_NAME, myName);
      localStorage.setItem(LS_ROOM, currentRoom);
      render();
    };

    sendBtn.onclick = sendMessage;

    clearFilesBtn.onclick = () => {
      pendingFiles = [];
      fileEl.value = '';
      updateFileInfo();
    };

    msgEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    fileEl.addEventListener('change', () => {
      pendingFiles = Array.from(fileEl.files || []);
      updateFileInfo();
    });

    roomEl.addEventListener('change', () => {
      currentRoom = roomEl.value.trim() || 'global';
      localStorage.setItem(LS_ROOM, currentRoom);
      render();
    });

    window.addEventListener('storage', (e) => {
      if (e.key === LS_MSGS || e.key === LS_ROOM) render();
    });

    if (channel) {
      channel.onmessage = () => render();
    }

    document.getElementById('saveName').addEventListener('click', () => nameEl.focus());

    render();
    updateFileInfo();
  </script>
</body>
</html>
